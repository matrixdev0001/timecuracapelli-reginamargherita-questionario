<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feedback – Time Cura Capelli</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    padding: 2rem;
    width: 100%;
    max-width: 540px;
    animation: fadeInUp 1s ease;
  }
  @keyframes fadeInUp {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
  }
  .logo {
    display: block;
    margin: 0 auto 1.5rem;
    max-width: 140px;
  }
  h1 {
    text-align: center;
    color: #00334e;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  p.intro {
    text-align: center;
    color: #555;
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }
  label {
    display: block;
    margin-top: 1.4rem;
    font-weight: 500;
    color: #333;
  }
  .rating {
    display: flex;
    flex-direction: row-reverse;
    justify-content: center;
    gap: 6px;
    font-size: 2rem;
  }
  .rating input { display: none; }
  .rating label {
    color: #ccc;
    cursor: pointer;
    transition: transform 0.2s ease, color 0.3s ease, text-shadow 0.3s;
    text-shadow: 0 0 0px transparent;
  }
  .rating label:hover,
  .rating label:hover ~ label {
    color: #d4a800;
    transform: scale(1.2);
    text-shadow: 0 0 8px rgba(212,168,0,0.4);
  }
  .rating input:checked ~ label {
    color: #b98f00;
    text-shadow: 0 0 10px rgba(212,168,0,0.3);
  }
  textarea {
    width: 100%;
    margin-top: 0.6rem;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 0.8rem;
    font-size: 1rem;
    resize: vertical;
    min-height: 100px;
    transition: border-color 0.3s;
  }
  textarea:focus {
    border-color: #00334e;
    outline: none;
  }
  button {
    display: block;
    width: 100%;
    margin-top: 2rem;
    background: linear-gradient(135deg, #00334e, #005a86);
    color: white;
    font-size: 1.1rem;
    padding: 0.9rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.3s ease;
  }
  button:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
  button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,83,118,0.4);
  }
  #msg {
    text-align: center;
    margin-top: 1rem;
    font-weight: 600;
    color: #d9534f;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #msg.visible { opacity: 1; }
  footer {
    text-align: center;
    font-size: 0.85rem;
    color: #999;
    margin-top: 2rem;
  }
  @media (max-width: 600px) {
    .rating { font-size: 1.6rem; }
  }
</style>
</head>
