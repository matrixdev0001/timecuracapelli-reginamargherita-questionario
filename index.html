<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feedback – Time Cura Capelli Regina Margherita</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    padding: 2rem;
    width: 100%;
    max-width: 540px;
    animation: fadeInUp 1s ease;
  }
  @keyframes fadeInUp {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
  }
  .logo {
    display: block;
    margin: 0 auto 1.5rem;
    max-width: 140px;
    height: auto;
    background: #00334e;
    border-radius: 8px;
    padding: 10px;
  }
  h1 {
    text-align: center;
    color: #00334e;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  p.intro {
    text-align: center;
    color: #555;
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }
  label {
    display: block;
    margin-top: 1.4rem;
    font-weight: 500;
    color: #333;
  }
  .rating {
    display: flex;
    flex-direction: row-reverse;
    justify-content: center;
    gap: 4px;
    margin-top: 0.5rem;
  }
  .rating input { display: none; }
  .rating label {
    font-size: 2rem;
    color: #ccc;
    cursor: pointer;
    transition: transform 0.2s ease, color 0.3s ease, text-shadow 0.3s;
  }
  .rating label:hover,
  .rating label:hover ~ label {
    color: #d4a800;
    transform: scale(1.2);
    text-shadow: 0 0 8px rgba(212,168,0,0.4);
  }
  .rating input:checked ~ label {
    color: #b98f00;
    text-shadow: 0 0 10px rgba(212,168,0,0.3);
  }
  textarea {
    width: 100%;
    margin-top: 0.6rem;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 0.8rem;
    font-size: 1rem;
    resize: vertical;
    min-height: 100px;
    transition: border-color 0.3s;
  }
  textarea:focus {
    border-color: #00334e;
    outline: none;
  }
  button {
    display: block;
    width: 100%;
    margin-top: 2rem;
    background: linear-gradient(135deg, #00334e, #005a86);
    color: white;
    font-size: 1.1rem;
    padding: 0.9rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.3s ease;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,83,118,0.4);
  }
  #msg {
    text-align: center;
    margin-top: 1rem;
    font-weight: 600;
    color: #00334e;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #msg.visible {
    opacity: 1;
  }
  footer {
    text-align: center;
    font-size: 0.85rem;
    color: #999;
    margin-top: 2rem;
  }
  @media (max-width: 600px) {
    .rating label { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<div class="card">
  <img src="logo_time.png" alt="Logo Time Cura Capelli" class="logo">
  <h1>Grazie per la tua opinione!</h1>
  <p class="intro">Compila il questionario in forma anonima: ci aiuti a migliorare ogni giorno nel nostro salone.</p>

  <form id="survey" autocomplete="off" novalidate>
    <label>1. Che voto daresti da 1 a 10 alla tua esperienza da Time Cura Capelli. </label>
    <div class="rating">
      <input type="radio" name="accoglienza" id="acc10" value="10"><label for="acc10">★</label>
      <input type="radio" name="accoglienza" id="acc9" value="9"><label for="acc9">★</label>
      <input type="radio" name="accoglienza" id="acc8" value="8"><label for="acc8">★</label>
      <input type="radio" name="accoglienza" id="acc7" value="7"><label for="acc7">★</label>
      <input type="radio" name="accoglienza" id="acc6" value="6"><label for="acc6">★</label>
      <input type="radio" name="accoglienza" id="acc5" value="5"><label for="acc5">★</label>
      <input type="radio" name="accoglienza" id="acc4" value="4"><label for="acc4">★</label>
      <input type="radio" name="accoglienza" id="acc3" value="3"><label for="acc3">★</label>
      <input type="radio" name="accoglienza" id="acc2" value="2"><label for="acc2">★</label>
      <input type="radio" name="accoglienza" id="acc1" value="1"><label for="acc1">★</label>
    </div>

    <label>2) Qualità del taglio e del servizio</label>
    <div class="rating">
      <input type="radio" name="qualita" id="q5" value="5"><label for="q5">★</label>
      <input type="radio" name="qualita" id="q4" value="4"><label for="q4">★</label>
      <input type="radio" name="qualita" id="q3" value="3"><label for="q3">★</label>
      <input type="radio" name="qualita" id="q2" value="2"><label for="q2">★</label>
      <input type="radio" name="qualita" id="q1" value="1"><label for="q1">★</label>
    </div>

    <label>3) Pulizia e comfort del salone</label>
    <div class="rating">
      <input type="radio" name="pulizia" id="p5" value="5"><label for="p5">★</label>
      <input type="radio" name="pulizia" id="p4" value="4"><label for="p4">★</label>
      <input type="radio" name="pulizia" id="p3" value="3"><label for="p3">★</label>
      <input type="radio" name="pulizia" id="p2" value="2"><label for="p2">★</label>
      <input type="radio" name="pulizia" id="p1" value="1"><label for="p1">★</label>
    </div>

    <label>4) Tempistica e puntualità dell’appuntamento</label>
    <div class="rating">
      <input type="radio" name="tempistica" id="t5" value="5"><label for="t5">★</label>
      <input type="radio" name="tempistica" id="t4" value="4"><label for="t4">★</label>
      <input type="radio" name="tempistica" id="t3" value="3"><label for="t3">★</label>
      <input type="radio" name="tempistica" id="t2" value="2"><label for="t2">★</label>
      <input type="radio" name="tempistica" id="t1" value="1"><label for="t1">★</label>
    </div>

    <label>5) Consiglieresti il nostro salone a un amico?</label>
    <div class="rating">
      <input type="radio" name="consiglio" id="c5" value="5"><label for="c5">★</label>
      <input type="radio" name="consiglio" id="c4" value="4"><label for="c4">★</label>
      <input type="radio" name="consiglio" id="c3" value="3"><label for="c3">★</label>
      <input type="radio" name="consiglio" id="c2" value="2"><label for="c2">★</label>
      <input type="radio" name="consiglio" id="c1" value="1"><label for="c1">★</label>
    </div>

    <label>2. Cosa ti è piaciuto?</label>
    <textarea name="commenti" placeholder="Scrivi qui il tuo feedback..."></textarea>

    
    <button type="submit" id="submitBtn" disabled>Invia il mio feedback</button>
  </form>

  <div id="msg"></div>
  <footer>© Time Cura Capelli – Roma, Viale Regina Margherita</footer>
</div>

<script>
  const endpoint = "https://questionario-timecuracapellimargherita.spring-base-cc9f.workers.dev"; // sostituisci con il tuo Worker
  const form = document.getElementById("survey");
  const msg = document.getElementById("msg");
  const submitBtn = document.getElementById("submitBtn");
  const ratingInputs = document.querySelectorAll('input[type="radio"]');

  function checkAllRated() {
    const groups = [...new Set([...ratingInputs].map(i => i.name))];
    const allRated = groups.every(name => document.querySelector(`input[name="${name}"]:checked`));
    
    submitBtn.disabled = !allRated;

    if (!allRated) {
      msg.textContent = "⚠️ Per favore, vota tutte le categorie prima di inviare.";
      msg.classList.add("visible");
    } else {
      msg.textContent = "";
      msg.classList.remove("visible");
    }
  }

  ratingInputs.forEach(input => input.addEventListener('change', checkAllRated));

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.textContent = "⏳ Invio in corso...";
    msg.classList.add("visible");

    const data = Object.fromEntries(new FormData(form).entries());

    try {
      const res = await fetch(endpoint, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({answers:data})
      });

      if (res.ok) {
        msg.textContent = "💖 Grazie! Il tuo feedback è stato inviato con successo.";
        form.reset();
        submitBtn.disabled = true;
      } else {
        msg.textContent = "❌ Errore durante l’invio. Riprova più tardi.";
      }
    } catch (err) {
      console.error(err);
      msg.textContent = "⚠️ Connessione non disponibile.";
    }
  });

  window.addEventListener('load', () => {
  const form = document.getElementById('survey');
  form.reset();            // Reset valori radio e textarea
  document.getElementById('submitBtn').disabled = true; // Disabilita pulsante
  const msg = document.getElementById('msg');
  msg.textContent = '';    // Rimuovi messaggi
  msg.classList.remove('visible');
});

</script>

</body>
</html>
